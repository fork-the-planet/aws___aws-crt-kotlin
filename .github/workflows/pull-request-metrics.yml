name: Pull request metrics
on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  id-token: write
  contents: read

jobs:
  artifact-size-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Gradle
        uses: aws/aws-kotlin-repo-tools/.github/actions/configure-gradle@main

      - name: Build
        shell: bash
        run: |
          echo "FIXME: Enable K/N builds - then capture KN artifact metrics"
          ./gradlew -Paws.kotlin.native=false build --parallel
          ./gradlew -Paws.kotlin.native=false publishAllPublicationsToTestLocalRepository --parallel

      - name: Calculate metrics
        uses: aws/aws-kotlin-repo-tools/.github/actions/artifact-size-metrics/calculate-and-upload@main
        with:
          upload: 'false'
          release_metrics: 'false'

      - name: Configure credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CI_AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Process metrics
        uses: aws/aws-kotlin-repo-tools/.github/actions/artifact-size-metrics/download-and-process@main
        with:
          download: 'false'
